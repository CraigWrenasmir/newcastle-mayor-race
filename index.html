<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newcastle Mayor — Race to the Counter</title>
<style>
  :root {
    --scene-w: 2902;
    --scene-h: 1560;
    /* Race lane runs along the back tile area. Tune these if feet don't sit right. */
    --lane-start: 6%;    /* leftmost x (entering the shop) */
    --lane-end: 72%;     /* rightmost x (at the counter) */
    --lane-bottom: 14%;  /* how far above the image bottom the feet sit */
    --sprite-h: 43%;     /* candidate height as % of scene height */
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f3f3f3;
    min-height: 100vh;
  }

  header {
    padding: 14px 20px 10px;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.7;
  }

  .stage {
    width: min(100vw, 1600px);
    margin: 0 auto;
    padding: 10px;
  }

  .scene {
    position: relative;
    width: 100%;
    aspect-ratio: var(--scene-w) / var(--scene-h);
    background-image: url('scenes/mcdonalds.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    overflow: hidden;
    border: 2px solid #222;
  }

  .candidate {
    position: absolute;
    bottom: var(--lane-bottom);
    height: var(--sprite-h);
    transform: translateX(-50%);
    transition: left 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .candidate img {
    height: 100%;
    width: auto;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.4));
  }
  .candidate .tag {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.5px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }

  /* Test-mode vote count under the stage */
  .leaderboard {
    margin: 16px auto 40px;
    width: min(100vw, 1600px);
    padding: 0 10px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    font-size: 12px;
  }
  .leaderboard .row {
    background: #1b1b1b;
    border: 1px solid #2a2a2a;
    padding: 8px;
    border-radius: 4px;
  }
  .leaderboard .name { font-weight: 600; }
  .leaderboard .party { opacity: 0.6; font-size: 10px; }
  .leaderboard .votes { margin-top: 2px; font-variant-numeric: tabular-nums; }

  @media (max-width: 700px) {
    .leaderboard { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>Newcastle Mayor 2026 — Race to the Counter</h1>
  <p id="status">Loading…</p>
</header>

<div class="stage">
  <div class="scene" id="scene">
    <!-- candidates injected by script -->
  </div>
</div>

<div class="leaderboard" id="leaderboard"></div>

<script>
  // Candidate definitions — order doesn't matter, sort happens by votes
  const CANDIDATES = [
    { key: 'clausen', name: 'Clausen',  first: 'Declan',    party: 'Labor',             sprite: 'candidates/clausen.png' },
    { key: 'mccabe',  name: 'McCabe',   first: 'Charlotte', party: 'Greens',            sprite: 'candidates/mccabe.png' },
    { key: 'morris',  name: 'Morris',   first: 'Gavin',     party: 'Independent',       sprite: 'candidates/morris.png' },
    { key: 'barrie',  name: 'Barrie',   first: 'Jenny',     party: 'Liberal',           sprite: 'candidates/barrie.png' },
    { key: 'caine',   name: 'Caine',    first: 'Milton',    party: 'Independent',       sprite: 'candidates/caine.png' },
    { key: 'obrien',  name: "O'Brien",  first: 'Stephen',   party: 'Socialist Alliance', sprite: 'candidates/obrien.png' },
  ];

  // Fallback if results.json hasn't been written yet
  const FALLBACK_VOTES = {
    clausen: 0, mccabe: 0, morris: 0, barrie: 0, caine: 0, obrien: 0,
  };

  function render(votes) {
    const max = Math.max(...Object.values(votes));
    const sceneEl = document.getElementById('scene');
    const laneStart = 6;   // %
    const laneEnd = 72;    // %
    const span = laneEnd - laneStart;

    // Clear and re-render
    sceneEl.innerHTML = '';

    // Draw candidates; give a small vertical jitter so overlapping sprites don't sit exactly on top of each other
    CANDIDATES.forEach((c, i) => {
      const v = votes[c.key] ?? 0;
      const ratio = max > 0 ? v / max : 0;
      const leftPct = laneStart + ratio * span;
      const el = document.createElement('div');
      el.className = 'candidate';
      el.style.left = leftPct + '%';
      // slight z-order staggering so trailing candidates aren't hidden behind leaders
      el.style.zIndex = 10 + i;
      el.innerHTML = `
        <img src="${c.sprite}" alt="${c.first} ${c.name}">
        <div class="tag">${c.name.toUpperCase()}</div>
      `;
      sceneEl.appendChild(el);
    });

    // Leaderboard
    const lbEl = document.getElementById('leaderboard');
    const sorted = [...CANDIDATES].sort((a, b) => (votes[b.key] ?? 0) - (votes[a.key] ?? 0));
    lbEl.innerHTML = sorted.map((c, i) => `
      <div class="row">
        <div class="name">${i + 1}. ${c.first} ${c.name}</div>
        <div class="party">${c.party}</div>
        <div class="votes">${(votes[c.key] ?? 0).toLocaleString()} votes</div>
      </div>
    `).join('');
  }

  function formatUpdatedLabel(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString('en-AU', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });
    } catch { return iso; }
  }

  async function loadAndRender() {
    try {
      const res = await fetch('results.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      render(data.totals ?? FALLBACK_VOTES);
      const status = document.getElementById('status');
      const total = data.ballot_papers?.toLocaleString() ?? '—';
      const formal = data.formal?.toLocaleString() ?? '—';
      status.textContent = `${total} ballot papers counted (${formal} formal) · last scrape ${formatUpdatedLabel(data.updated)}`;
    } catch (e) {
      render(FALLBACK_VOTES);
      document.getElementById('status').textContent = 'Results not available yet — first scrape pending.';
    }
  }

  loadAndRender();
  setInterval(loadAndRender, 60_000);
</script>

</body>
</html>
